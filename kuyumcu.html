<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuyumcu Stok Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #B8860B; --gold-light: #F5E6B5; --gold-mid: #D4A017; --gold-dark: #7A5500;
    --sale-bg: #FFF0F0; --sale-text: #C0392B; --buy-bg: #F0F7F0; --buy-text: #1E7E34;
    --bg: #F9F7F2; --surface: #FFFFFF; --surface2: #F5F3EE;
    --border: #E0D9CC; --text: #2C2418; --text2: #7A6E60;
  }
  body { font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--gold-dark); color: #F5E6B5; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .topbar-title { font-family: 'Crimson Pro', serif; font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }
  .topbar-btns { display: flex; gap: 8px; }
  .tbtn { background: rgba(245,230,181,0.15); border: 1px solid rgba(245,230,181,0.4); color: #F5E6B5; padding: 5px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .tbtn:hover { background: rgba(245,230,181,0.25); }
  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .sum-card { padding: 14px 20px; border-right: 1px solid var(--border); }
  .sum-card:last-child { border-right: none; }
  .sum-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .sum-value { font-size: 20px; font-weight: 600; font-family: 'Crimson Pro', serif; }
  .sum-value.green { color: #1E7E34; } .sum-value.gold { color: var(--gold); }
  .main-layout { display: grid; grid-template-columns: 300px 1fr; flex: 1; overflow: hidden; }
  .left-panel { padding: 14px; border-right: 1px solid var(--border); background: var(--surface2); overflow-y: auto; }
  .mode-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .mode-btn { padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.15s; }
  .mode-btn.alis { background: #2E7D32; color: #fff; } .mode-btn.satis { background: #C62828; color: #fff; }
  .mode-btn.inactive { opacity: 0.4; }
  .selected-mode-label { font-size: 11px; margin-bottom: 10px; padding: 5px 10px; background: var(--gold-light); border-radius: 6px; color: var(--gold-dark); font-weight: 500; }
  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 6px; margin-top: 10px; display: flex; justify-content: space-between; }
  .section-title span { cursor: pointer; color: var(--gold-mid); }
  .quick-products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 4px; }
  .qp-btn { padding: 7px 4px; border: 1px solid var(--border); border-radius: 7px; background: var(--surface); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text); text-align: center; transition: all 0.1s; }
  .qp-btn:hover { border-color: var(--gold-mid); color: var(--gold-dark); background: var(--gold-light); }
  .form-group { margin-top: 8px; }
  .form-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; display: block; }
  .form-input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); }
  .form-input:focus { outline: none; border-color: var(--gold-mid); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .total-display { margin-top: 10px; padding: 10px 14px; background: var(--gold-light); border-radius: 8px; border: 1px solid #D4A01760; }
  .total-label { font-size: 11px; color: var(--gold-dark); margin-bottom: 2px; }
  .total-value { font-size: 20px; font-weight: 600; color: var(--gold-dark); font-family: 'Crimson Pro', serif; }
  .submit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .btn-submit { padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; background: var(--gold-dark); color: #F5E6B5; }
  .btn-submit:hover { background: var(--gold); }
  .btn-clear { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; background: transparent; color: var(--text2); }
  .btn-clear:hover { background: var(--surface); }
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .tab { padding: 11px 20px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); transition: all 0.15s; font-weight: 500; }
  .tab.active { color: var(--gold-dark); border-bottom-color: var(--gold); }
  .tab-content { padding: 14px; flex: 1; overflow-y: auto; }
  .tab-panel { display: none; } .tab-panel.active { display: block; }
  .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .search-input { padding: 7px 12px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); width: 220px; }
  .search-input:focus { outline: none; border-color: var(--gold-mid); }
  .info-text { font-size: 12px; color: var(--text2); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--surface2); position: sticky; top: 0; }
  td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #FAF7F0; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.alis { background: var(--buy-bg); color: var(--buy-text); } .badge.satis { background: var(--sale-bg); color: var(--sale-text); }
  .amount-pos { color: var(--buy-text); font-weight: 500; } .amount-neg { color: var(--sale-text); font-weight: 500; }
  .bottom-actions { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: var(--surface2); flex-shrink: 0; }
  .btn-danger { padding: 7px 14px; background: #C62828; color: #fff; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .btn-warning { padding: 7px 14px; background: var(--gold-mid); color: #fff; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .btn-refresh { margin-left: auto; padding: 7px 14px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text2); }
  .stock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .stock-card { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; background: var(--surface); }
  .stock-name { font-weight: 600; font-size: 14px; margin-bottom: 8px; color: var(--gold-dark); }
  .stock-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stock-val { color: var(--text); font-weight: 500; }
  .product-list { display: grid; gap: 8px; }
  .product-item { border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
  .product-name { font-weight: 500; font-size: 13px; } .product-unit { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .product-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); font-family: 'DM Sans', sans-serif; }
  .product-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
  .add-product-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .add-product-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); }
  .add-product-row select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); }
  .add-product-row button { padding: 7px 14px; background: var(--gold-dark); color: #F5E6B5; border: none; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--gold-dark); color: #F5E6B5; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-title">&#9672; Kuyumcu Stok Yönetimi</div>
    <div class="topbar-btns">
      <button class="tbtn" onclick="exportCSV()">CSV Dışa Aktar</button>
      <button class="tbtn" onclick="importCSV()">İçe Aktar</button>
      <button class="tbtn" onclick="backup()">Yedek Al</button>
    </div>
  </div>
  <div class="summary-bar">
    <div class="sum-card"><div class="sum-label">Toplam Alış</div><div class="sum-value gold" id="sum-alis">0,00 TL</div></div>
    <div class="sum-card"><div class="sum-label">Toplam Satış</div><div class="sum-value gold" id="sum-satis">0,00 TL</div></div>
    <div class="sum-card"><div class="sum-label">Elde Edilen Kâr</div><div class="sum-value green" id="sum-kar">0,00 TL</div></div>
    <div class="sum-card"><div class="sum-label">Stok Değeri</div><div class="sum-value gold" id="sum-stok">0,00 TL</div></div>
  </div>
  <div class="main-layout">
    <div class="left-panel">
      <div class="mode-btns">
        <button class="mode-btn alis" id="btn-alis" onclick="setMode('Alış')">Alış  F1</button>
        <button class="mode-btn satis inactive" id="btn-satis" onclick="setMode('Satış')">Satış  F2</button>
      </div>
      <div class="selected-mode-label" id="mode-label">Seçili İşlem: Alış</div>
      <div class="section-title">Hızlı Ürünler <span onclick="switchTab('urunler')">Düzenle</span></div>
      <div class="quick-products" id="quick-products"></div>
      <div class="form-group">
        <label class="form-label">Ürün</label>
        <div style="display:flex;gap:6px;">
          <input class="form-input" id="urun-input" placeholder="Ürün adı..." style="flex:1;" />
          <button class="qp-btn" style="padding:7px 12px;white-space:nowrap;" onclick="switchTab('urunler')">Seç</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Birim</label>
        <select class="form-input" id="birim-select"><option>Gram</option><option>Adet</option><option>Karat</option></select>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Miktar</label><input class="form-input" id="miktar-input" type="number" min="0" step="0.01" placeholder="0" oninput="calcTotal()" /></div>
        <div class="form-group"><label class="form-label">Birim Fiyat (TL)</label><input class="form-input" id="fiyat-input" type="number" min="0" step="0.01" placeholder="0.00" oninput="calcTotal()" /></div>
      </div>
      <div class="total-display">
        <div class="total-label">İşlem Toplamı</div>
        <div class="total-value" id="total-display">0,00 TL</div>
      </div>
      <div class="submit-row">
        <button class="btn-submit" onclick="submitTransaction()">Gönder</button>
        <button class="btn-clear" onclick="clearForm()">Temizle</button>
      </div>
    </div>
    <div class="right-panel">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('islem')">İşlem Geçmişi</div>
        <div class="tab" onclick="switchTab('stok')">Stok Durumu</div>
        <div class="tab" onclick="switchTab('urunler')">Ürünler</div>
      </div>
      <div class="tab-content">
        <div class="tab-panel active" id="tab-islem">
          <div class="search-row">
            <span class="info-text">Ara:</span>
            <input class="search-input" id="search-input" placeholder="İşlem ara..." oninput="renderTransactions()" />
            <span class="info-text">Ctrl+tıkla = çoklu seçim</span>
          </div>
          <table>
            <thead><tr>
              <th><input type="checkbox" id="chk-all" onchange="toggleAll(this.checked)"></th>
              <th>ID</th><th>Tarih</th><th>Tür</th><th>Ürün</th><th>Miktar</th><th>Birim</th><th>Birim Fiyat</th><th>Toplam</th>
            </tr></thead>
            <tbody id="txn-body"></tbody>
          </table>
        </div>
        <div class="tab-panel" id="tab-stok">
          <div class="stock-grid" id="stock-grid"></div>
        </div>
        <div class="tab-panel" id="tab-urunler">
          <div class="add-product-row">
            <input id="new-product-name" placeholder="Yeni ürün adı..." />
            <select id="new-product-birim"><option>Gram</option><option>Adet</option><option>Karat</option></select>
            <button onclick="addProduct()">+ Ekle</button>
          </div>
          <div class="product-list" id="product-list"></div>
        </div>
      </div>
      <div class="bottom-actions">
        <button class="btn-danger" onclick="deleteSelected()">Seçili İşlemleri Sil</button>
        <button class="btn-warning" onclick="clearAll()">Tüm İşlemleri Temizle</button>
        <button class="btn-refresh" onclick="render()">&#8635; Yenile</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="csv-file-input" accept=".csv" style="display:none" onchange="handleCSVImport(event)" />

<script>
let mode = 'Alış';
let transactions = JSON.parse(localStorage.getItem('kuyumcu_txns') || 'null') || [
  {id:21,date:'04.05.2026 02:40',tur:'Alış',urun:'22 Ayar Gram Altın',miktar:4,birim:'Gram',birimFiyat:4,toplam:16},
  {id:22,date:'04.05.2026 02:45',tur:'Satış',urun:'22 Ayar Gram Altın',miktar:55,birim:'Gram',birimFiyat:3333,toplam:183315},
  {id:23,date:'04.05.2026 02:46',tur:'Satış',urun:'24 Ayar Gram Altın',miktar:50,birim:'Gram',birimFiyat:100,toplam:5000},
  {id:24,date:'04.05.2026 02:46',tur:'Alış',urun:'24 Ayar Gram Altın',miktar:100,birim:'Gram',birimFiyat:90,toplam:9000},
];
let fullProducts = JSON.parse(localStorage.getItem('kuyumcu_products') || 'null') || [
  {name:'24 Ayar Gram Altın',birim:'Gram'},{name:'22 Ayar Gram Altın',birim:'Gram'},
  {name:'22A Hurda Altın',birim:'Gram'},{name:'Çeyrek Altın',birim:'Adet'},
  {name:'Yarım Altın',birim:'Adet'},{name:'Ata Altın',birim:'Adet'},
];
let selectedIds = new Set();
let nextId = Math.max(...transactions.map(t=>t.id), 0) + 1;

function save() {
  localStorage.setItem('kuyumcu_txns', JSON.stringify(transactions));
  localStorage.setItem('kuyumcu_products', JSON.stringify(fullProducts));
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function fmt(n) { return n.toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' TL'; }
function now() {
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function setMode(m) {
  mode=m; document.getElementById('mode-label').textContent='Seçili İşlem: '+m;
  document.getElementById('btn-alis').classList.toggle('inactive',m!=='Alış');
  document.getElementById('btn-satis').classList.toggle('inactive',m!=='Satış');
}
function calcTotal() {
  const m=parseFloat(document.getElementById('miktar-input').value)||0;
  const f=parseFloat(document.getElementById('fiyat-input').value)||0;
  document.getElementById('total-display').textContent=fmt(m*f);
}
function clearForm() {
  document.getElementById('urun-input').value='';
  document.getElementById('miktar-input').value='';
  document.getElementById('fiyat-input').value='';
  document.getElementById('total-display').textContent='0,00 TL';
}
function submitTransaction() {
  const urun=document.getElementById('urun-input').value.trim();
  const miktar=parseFloat(document.getElementById('miktar-input').value);
  const fiyat=parseFloat(document.getElementById('fiyat-input').value);
  const birim=document.getElementById('birim-select').value;
  if(!urun||!miktar||!fiyat){alert('Lütfen tüm alanları doldurun.');return;}
  transactions.push({id:nextId++,date:now(),tur:mode,urun,miktar,birim,birimFiyat:fiyat,toplam:miktar*fiyat});
  save(); clearForm(); render(); toast('İşlem kaydedildi ✓');
}
function renderTransactions() {
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const body=document.getElementById('txn-body');
  const filtered=[...transactions].reverse().filter(t=>!q||t.urun.toLowerCase().includes(q)||t.tur.toLowerCase().includes(q));
  body.innerHTML=filtered.map(t=>`
    <tr onclick="toggleSel(${t.id})" style="cursor:pointer;background:${selectedIds.has(t.id)?'var(--gold-light)':''}">
      <td><input type="checkbox" ${selectedIds.has(t.id)?'checked':''} onchange="toggleSel(${t.id})" onclick="event.stopPropagation()"></td>
      <td>${t.id}</td>
      <td style="color:var(--text2);font-size:12px;">${t.date}</td>
      <td><span class="badge ${t.tur==='Alış'?'alis':'satis'}">${t.tur}</span></td>
      <td>${t.urun}</td><td>${t.miktar}</td><td>${t.birim}</td>
      <td>${t.birimFiyat.toLocaleString('tr-TR',{minimumFractionDigits:2})} TL</td>
      <td class="${t.tur==='Satış'?'amount-neg':'amount-pos'}">${t.toplam.toLocaleString('tr-TR',{minimumFractionDigits:2})} TL</td>
    </tr>`).join('');
}
function toggleSel(id) { if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id); renderTransactions(); }
function toggleAll(checked) { if(checked)transactions.forEach(t=>selectedIds.add(t.id));else selectedIds.clear(); renderTransactions(); }
function deleteSelected() {
  if(!selectedIds.size){alert('Silinecek işlem seçin.');return;}
  if(!confirm(`${selectedIds.size} işlem silinsin mi?`))return;
  transactions=transactions.filter(t=>!selectedIds.has(t.id));
  selectedIds.clear(); save(); render(); toast('İşlemler silindi');
}
function clearAll() {
  if(!confirm('Tüm işlemler silinsin mi? Bu işlem geri alınamaz!'))return;
  transactions=[];selectedIds.clear();save();render();toast('Tüm işlemler temizlendi');
}
function renderSummary() {
  const alis=transactions.filter(t=>t.tur==='Alış').reduce((s,t)=>s+t.toplam,0);
  const satis=transactions.filter(t=>t.tur==='Satış').reduce((s,t)=>s+t.toplam,0);
  document.getElementById('sum-alis').textContent=fmt(alis);
  document.getElementById('sum-satis').textContent=fmt(satis);
  document.getElementById('sum-kar').textContent=fmt(satis-alis);
  document.getElementById('sum-stok').textContent=fmt(alis*0.5);
}
function renderStock() {
  const map={};
  transactions.forEach(t=>{
    if(!map[t.urun])map[t.urun]={alis:0,satis:0,alisMiktar:0,satisMiktar:0};
    if(t.tur==='Alış'){map[t.urun].alis+=t.toplam;map[t.urun].alisMiktar+=t.miktar;}
    else{map[t.urun].satis+=t.toplam;map[t.urun].satisMiktar+=t.miktar;}
  });
  const grid=document.getElementById('stock-grid');
  grid.innerHTML=Object.entries(map).map(([name,s])=>`
    <div class="stock-card">
      <div class="stock-name">${name}</div>
      <div class="stock-row"><span>Alış Miktarı</span><span class="stock-val amount-pos">${s.alisMiktar} g</span></div>
      <div class="stock-row"><span>Satış Miktarı</span><span class="stock-val amount-neg">${s.satisMiktar} g</span></div>
      <div class="stock-row"><span>Kalan Stok</span><span class="stock-val">${(s.alisMiktar-s.satisMiktar).toFixed(2)} g</span></div>
      <div class="stock-row"><span>Alış Tutarı</span><span class="stock-val">${fmt(s.alis)}</span></div>
      <div class="stock-row"><span>Satış Tutarı</span><span class="stock-val">${fmt(s.satis)}</span></div>
      <div class="stock-row"><span>Kâr</span><span class="stock-val ${s.satis-s.alis>=0?'amount-pos':'amount-neg'}">${fmt(s.satis-s.alis)}</span></div>
    </div>`).join('')||'<p style="color:var(--text2);font-size:13px;">Henüz stok verisi yok.</p>';
}
function renderProductList() {
  document.getElementById('product-list').innerHTML=fullProducts.map((p,i)=>`
    <div class="product-item">
      <div><div class="product-name">${p.name}</div><div class="product-unit">${p.birim}</div></div>
      <div style="display:flex;gap:6px;">
        <button class="product-btn" onclick="selectProduct('${p.name}','${p.birim}')">Seç</button>
        <button class="product-btn" style="color:#C62828;border-color:#C62828;" onclick="removeProduct(${i})">Sil</button>
      </div>
    </div>`).join('');
}
function renderQuickProducts() {
  document.getElementById('quick-products').innerHTML=fullProducts.slice(0,6).map(p=>`
    <button class="qp-btn" onclick="selectProduct('${p.name}','${p.birim}')">${p.name.replace(' Altın','').replace(' Gram','')}</button>`).join('');
}
function selectProduct(name,birim) {
  document.getElementById('urun-input').value=name;
  document.getElementById('birim-select').value=birim;
  switchTab('islem');
}
function addProduct() {
  const name=document.getElementById('new-product-name').value.trim();
  const birim=document.getElementById('new-product-birim').value;
  if(!name){alert('Ürün adı girin.');return;}
  if(fullProducts.find(p=>p.name===name)){alert('Bu ürün zaten var.');return;}
  fullProducts.push({name,birim});
  document.getElementById('new-product-name').value='';
  save(); renderProductList(); renderQuickProducts(); toast('Ürün eklendi ✓');
}
function removeProduct(i) {
  if(!confirm(`"${fullProducts[i].name}" silinsin mi?`))return;
  fullProducts.splice(i,1); save(); renderProductList(); renderQuickProducts();
}
function switchTab(t) {
  const tabs=['islem','stok','urunler'];
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',tabs[i]===t));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}
function exportCSV() {
  const rows=[['ID','Tarih','Tür','Ürün','Miktar','Birim','Birim Fiyat','Toplam']];
  transactions.forEach(t=>rows.push([t.id,t.date,t.tur,t.urun,t.miktar,t.birim,t.birimFiyat,t.toplam]));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='kuyumcu_islemler_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); toast('CSV indirildi ✓');
}
function importCSV() { document.getElementById('csv-file-input').click(); }
function handleCSVImport(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const lines=ev.target.result.split('\n').slice(1);
    let count=0;
    lines.forEach(line=>{
      if(!line.trim())return;
      const cols=line.split(',').map(c=>c.replace(/^"|"$/g,''));
      if(cols.length<8)return;
      transactions.push({id:nextId++,date:cols[1],tur:cols[2],urun:cols[3],miktar:parseFloat(cols[4]),birim:cols[5],birimFiyat:parseFloat(cols[6]),toplam:parseFloat(cols[7])});
      count++;
    });
    save(); render(); toast(`${count} kayıt içe aktarıldı ✓`);
  };
  reader.readAsText(file,'utf-8');
  e.target.value='';
}
function backup() {
  const data=JSON.stringify({transactions,products:fullProducts},null,2);
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(data);
  a.download='kuyumcu_yedek_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); toast('Yedek alındı ✓');
}
document.addEventListener('keydown',e=>{
  if(e.key==='F1'){e.preventDefault();setMode('Alış');}
  if(e.key==='F2'){e.preventDefault();setMode('Satış');}
});
function render(){renderSummary();renderTransactions();renderStock();renderProductList();renderQuickProducts();}
render();
</script>
</body>
</html>
